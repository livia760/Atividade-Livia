<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<body>

<header>
    <h1>Contato</h1>
</header>

<nav>
    <a href="index.html">Início</a>
    <a href="sobre.html">Sobre</a>
    <a href="contato.html">Contato</a>
</nav>

<main class="contact">

<section>
    <h2>Entre em contato</h2>
    <form action="#" method="post" id="contato-form">
        <label for="email">Seu email:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu email" required>

        <label for="instagram">Seu Instagram:</label>
        <input type="text" id="instagram" name="instagram" placeholder="@seuInstagram" required>

        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem" rows="5" required></textarea>

        <button type="submit">Enviar</button>
    </form>
</section>

</main>

<footer>
    <p>© 2026 - Livia</p>
</footer>

</body>
</html>
